<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Grace Church — Services</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--sky-l:#d4e8ec;--sky-d:#2d5a65;--beige:#f0ebe0;--beige-d:#e0d8c8;--cream:#faf8f4;--text:#1a2a2e;--muted:#5a7a82;--white:#fff;--border:#e0d8c8;--g-paix:#6b4a8e;--g-paix-l:#ede4f5;--g-fid:#a03030;--g-fid-l:#fde8e8;--g-bonte:#8b4a2e;--g-bonte-l:#f5ede4;--edd-c:#3b6d11;--edd-l:#e8f5e8;--camp-c:#2d5a65}
[data-dark]{--hdr-bg:#0a1e22;--sky-l:#1a3a40;--sky-d:#7ec8d4;--beige:#1e2a2e;--beige-d:#263036;--cream:#111e22;--text:#e0eaec;--muted:#6a9aa4;--white:#1a2a2e;--border:#263036;--g-paix-l:#231a2e;--g-fid-l:#2e1a1a;--g-bonte-l:#2a1e14;--edd-l:#1a2e1a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;transition:background .2s,color .2s}
.hdr{background:#1a3a42;padding:14px 16px 0;transition:background .2s}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-title{font-family:'Lora',serif;font-size:17px;font-weight:600;color:#fff}
.hdr-right{display:flex;gap:8px;align-items:center}
.dark-btn{width:28px;height:28px;border-radius:50%;border:.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:#fff}
.priv-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);border:.5px solid rgba(255,255,255,.2)}
.nav{display:flex;overflow-x:auto;gap:0;padding-bottom:0;scrollbar-width:none;border-bottom:2px solid #0f2228}
.nav::-webkit-scrollbar{display:none}
.nav .nb:hover{color:rgba(255,255,255,.9);}
.nb{flex-shrink:0;padding:10px 16px;border-radius:0;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-size:12px;font-weight:500;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif}
.nb.on{background:transparent;color:#fff;border-bottom:2px solid #fff;font-weight:600}
.pnl{display:none;padding:14px 14px 56px}.pnl.on{display:block}
.filter-row{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:500;background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s}
.fb.on{background:var(--sky-d);border-color:var(--sky-d);color:#fff}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:.5px solid var(--border)}
.tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:640px}
.tbl th{background:var(--sky-d);color:#fff;padding:8px;text-align:left;font-size:10px;font-weight:500;white-space:nowrap}
.tbl td{padding:7px 8px;border-bottom:.5px solid var(--border);color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--beige)}
.tbl .dc{font-weight:500;color:var(--sky-d);white-space:nowrap}
.tbl .pc{font-weight:500}
.tbl .tr{background:#fff8e1}
.tbl .tr .dc::before{content:"● ";font-size:9px;color:#f0c040}
.grp-tabs{display:flex;gap:5px;margin-bottom:12px}
.grp-tab{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid var(--border);font-size:11px;font-weight:500;text-align:center;cursor:pointer;background:var(--white);color:var(--muted);transition:all .15s}
.grp-tab[data-g=paix].on{background:var(--g-paix);border-color:var(--g-paix);color:#fff}
.grp-tab[data-g=fid].on{background:var(--g-fid);border-color:var(--g-fid);color:#fff}
.grp-tab[data-g=bonte].on{background:var(--g-bonte);border-color:var(--g-bonte);color:#fff}
.fid-sub{display:flex;gap:5px;margin-bottom:12px}
.fid-sb{flex:1;padding:6px;border-radius:8px;border:1.5px solid var(--border);font-size:11px;font-weight:500;text-align:center;cursor:pointer;background:var(--white);color:var(--muted);transition:all .15s}
.fid-sb.on{background:var(--g-fid-l);border-color:var(--g-fid);color:var(--g-fid)}
.grp-card{background:var(--white);border-radius:12px;border:.5px solid var(--border);margin-bottom:8px;overflow:hidden}
.grp-head{padding:8px 14px;font-size:12px;font-weight:500;display:flex;justify-content:space-between}
.gc-paix{background:var(--g-paix-l);color:var(--g-paix)}
.gc-fid{background:var(--g-fid-l);color:var(--g-fid)}
.gc-bonte{background:var(--g-bonte-l);color:var(--g-bonte)}
.grp-row{display:flex;gap:6px;padding:7px 14px;border-top:.5px solid var(--border);font-size:12px}
.grp-lbl{color:var(--muted);width:68px;flex-shrink:0;font-size:11px}
.grp-val{color:var(--text);font-weight:500;flex:1}
.mois-hd{font-size:12px;font-weight:500;color:var(--sky-d);background:var(--sky-l);border-radius:8px;padding:7px 12px;margin-bottom:8px;margin-top:14px}
.mois-hd:first-child{margin-top:0}
.edd-ptabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.edd-ptabs::-webkit-scrollbar{display:none}
.edd-ptb{flex-shrink:0;padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:500;background:var(--white);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.edd-ptb.on{background:var(--edd-c);border-color:var(--edd-c);color:#fff}
.edd-ctabs{display:flex;gap:5px;margin-bottom:12px}
.edd-ctb{flex:1;padding:7px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;font-weight:500;text-align:center;cursor:pointer;background:var(--white);color:var(--muted);transition:all .15s}
.edd-ctb.on{background:var(--edd-l);border-color:var(--edd-c);color:var(--edd-c)}
.edd-card{background:var(--white);border-radius:12px;border:.5px solid var(--border);margin-bottom:8px;display:flex;overflow:hidden}
.edd-datecol{background:var(--edd-l);width:62px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:8px 4px;border-right:.5px solid var(--border)}
.edd-dtxt{font-size:11px;font-weight:500;color:var(--edd-c);text-align:center;line-height:1.4}
.edd-body{flex:1;padding:8px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.edd-item .lbl{font-size:10px;color:var(--muted)}
.edd-item .val{font-size:12px;font-weight:500;color:var(--text)}
.day-block{background:var(--white);border-radius:14px;border:.5px solid var(--border);margin-bottom:12px;overflow:hidden}
.day-title{background:var(--sky-d);padding:10px 14px;font-size:13px;font-weight:500;color:#fff}
.seance{border-top:.5px solid var(--border)}
.seance-hd{padding:8px 14px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;background:var(--sky-l);color:var(--sky-d)}
.seance-hd.soir{background:rgba(45,90,101,.15)}
.seance-bd{display:grid;grid-template-columns:1fr 1fr;gap:0}
.scol{padding:10px 14px;border-right:.5px solid var(--border)}
.scol:last-child{border-right:none}
.scol-lbl{font-size:10px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--beige);color:var(--text);margin:2px 2px 2px 0}
.regie-bar{padding:10px 14px;border-top:.5px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;font-size:11px;background:var(--white)}
.regie-bar span{color:var(--muted)}.regie-bar b{color:var(--text);font-weight:500}
.ent-bar{padding:6px 14px;border-top:.5px solid var(--border);font-size:11px;background:var(--beige-d);color:var(--muted)}
.ent-bar b{color:var(--sky-d)}
.camp-sub{display:flex;gap:5px;margin-bottom:14px}
.camp-sb{flex:1;padding:8px;border-radius:10px;border:1.5px solid var(--border);font-size:12px;font-weight:500;text-align:center;cursor:pointer;background:var(--white);color:var(--muted);transition:all .15s}
.camp-sb.on{background:var(--sky-d);border-color:var(--sky-d);color:#fff}
.dej-card{background:var(--white);border-radius:12px;border:.5px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:12px;padding:10px 14px}
.dej-date{font-size:11px;font-weight:500;color:var(--sky-d);width:62px;flex-shrink:0}
.dej-eq{font-size:12px;color:var(--text);flex:1;line-height:1.5}
.mois-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mn-lbl{font-size:15px;font-weight:500;color:var(--sky-d)}
.mn-btn{width:32px;height:32px;border-radius:50%;border:.5px solid var(--border);background:var(--white);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--sky-d)}
.reun-card{background:var(--white);border-radius:12px;border:.5px solid var(--border);margin-bottom:8px;display:flex;gap:12px;padding:10px 14px}
.rdb{text-align:center;width:36px;flex-shrink:0;padding-top:2px}
.rdb-day{font-size:22px;font-weight:600;color:var(--sky-d);line-height:1}
.rdb-m{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.rdb-body{flex:1}
.rdb-type{font-size:13px;font-weight:500;color:var(--text)}
.rbadge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;margin-top:3px}
.rdb-lieu{font-size:11px;color:var(--muted);margin-top:2px}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.chants-block{padding:10px 14px;border-top:.5px solid var(--border);background:var(--beige)}
.chants-lbl{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;font-weight:500}
.chant-line{font-size:12px;color:var(--muted);padding:4px 8px;border-radius:6px;border:.5px dashed var(--border);margin-bottom:4px;background:var(--white)}

/* Header date */
.hdr-sub{font-size:9px;color:var(--sky-l);margin-top:2px;letter-spacing:.04em}
/* Légende */
.legend{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin-bottom:10px}
.l-dot{width:11px;height:11px;border-radius:3px;border:1.5px solid #f0c040;background:#fff8e1;flex-shrink:0}
/* Badge semaine */
.badge-week{display:inline-block;background:#f0c040;color:#7a5000;border-radius:4px;padding:0 5px;font-size:9px;font-weight:700}
/* Badge Sainte Cène */
.badge-sc{display:inline-block;background:#fef2f2;color:#991b1b;border-radius:4px;padding:0 6px;font-size:9px;font-weight:700;border:.5px solid #fca5a5}
/* Séparateur mois dans tbody */
.tbl tr.msep td{background:var(--sky-l);padding:4px 10px;font-size:10px;font-weight:700;color:var(--sky-d);text-transform:uppercase;letter-spacing:.08em;border-top:.5px solid var(--sky-d);border-bottom:.5px solid var(--sky-d);}
.tbl tr.msep:hover td{background:var(--sky-l)!important;}


.tbl-wrap-dej{overflow-x:visible;border-radius:9px;border:.5px solid var(--border)}
/* Prépa Table : tableau pleine largeur sans scroll */
.tbl.tbl-dej{min-width:unset;width:100%}
.tbl.tbl-dej td{white-space:normal;line-height:1.5}
.tbl.tbl-dej td.dc{width:62px;white-space:nowrap;vertical-align:top;padding-top:8px}
.tbl.tbl-dej tr.msep td{padding:5px 9px}
.tbl.tbl-dej tr.msep td.msep-e{padding:5px 0}

.tbl tr.msep td.msep-e{
  background:var(--sky-l);
  padding:5px 0;
  border-top:.5px solid var(--sky-d);
  border-bottom:.5px solid var(--sky-d);
}
/* Grp tabs uniformes teal */
.grp-tab.on{background:var(--sky-d)!important;border-color:var(--sky-d)!important;color:#fff!important;}
/* Header teal foncé */
.hdr{background:#1a3a42;padding:14px 16px 0;}
.hdr-title{color:#fff!important;font-family:'Lora',serif;}
</style>
</head>

<div class="pnl" id="pnl-campus">

    <div class="camp-sb" id="csb-entrainement" onclick="showCampSub('entrainement')">Entraînement</div>
  </div>
  <div id="camp-content"></div>
</div>

var _m=new Date().getMonth()+1; // 1-12
var _triActuel=_m<=3?"T1":_m<=6?"T2":_m<=9?"T3":"T4";
var _periodeActuelle=_m<=2?0:_m<=4?1:_m<=6?2:_m<=8?3:_m<=10?4:5; // index 0-5

function t(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pad(n){return String(n).padStart(2,"0");}
function fd(s){var p=s.split("-");var d=new Date(+p[0],+p[1]-1,+p[2]);return JOURC[d.getDay()]+" "+d.getDate()+" "+MOISC[+p[1]-1];}
function fdlong(s){var p=s.split("-");return p[2]*1+" "+MOIS[+p[1]-1];}
function tri(s){var m=+s.split("-")[1];return m<=3?"T1":m<=6?"T2":m<=9?"T3":"T4";}
function currentSundayStr(){
  var d=new Date();var day=d.getDay();
  var sun=new Date(d);
  if(day!==0)sun.setDate(d.getDate()+(7-day));
  return sun.getFullYear()+"-"+pad(sun.getMonth()+1)+"-"+pad(sun.getDate());
}
function isFirstSundayOfMonth(dateStr,allRows){
  var m=mois(dateStr);
  for(var i=0;i<allRows.length;i++){if(mois(allRows[i][0])===m)return allRows[i][0]===dateStr;}
  return false;
}
function fdShort(s){var p=s.split("-");return pad(+p[2])+"/"+pad(+p[1]);}

function mois(s){return +s.split("-")[1];}
function groupByMois(rows,dateIdx){
  var g={};
  rows.forEach(function(r){var m=MOIS[mois(r[dateIdx])-1];if(!g[m])g[m]=[];g[m].push(r);});
  return g;
}
function filterTri(rows,t,idx){return rows.filter(function(r){return tri(r[idx||0])===t;});}
function buildFiltres(cont,cur,fn){
  document.getElementById(cont).innerHTML=["T1","T2","T3","T4"].map(function(t){
    return '<button class="fb'+(t===cur?" on":"") +'" onclick="'+fn+'(\''+t+'\')">' +t+'</button>';
  }).join("");
}

function renderCampus(){
  var data=campSub==="louange"?CAMP_LOUANGE:CAMP_ENT;
  var days={};var dayOrder=[];
  data.forEach(function(s){
    var dj=s.d.split(" ")[0];
    if(!days[dj]){days[dj]=[];dayOrder.push(dj);}
    days[dj].push(s);
  });
  var h="";
  dayOrder.forEach(function(dj){
    h+='<div class="day-block"><div class="day-title">'+dj+'</div>';
    days[dj].forEach(function(s){
      var moment=s.d.indexOf("Matin")>=0?"Matin":"Soir";
      var isSoir=moment==="Soir";
      h+='<div class="seance">';
      if(campSub==="entrainement"){
        if(s.ent){
          var entD=parseDate(s.ent);
          var entLabel=entD?fdlong(entD):s.ent;
          h+='<div style="background:var(--sky-d);color:#fff;padding:8px 14px;font-size:11px;font-weight:600">Entraînement : <span style="font-weight:400">'+entLabel+'</span></div>';
        }
        h+='<div class="seance-hd'+(isSoir?' soir':'')+'">'+s.d+'</div>';
      } else {
        h+='<div class="seance-hd'+(isSoir?' soir':'')+'">'+moment+'</div>';
      }
      h+='<div class="seance-bd">';
      h+='<div class="scol"><div class="scol-lbl">Présidence &amp; choristes</div>';
      s.ch.split(",").forEach(function(c,i){
        if(i===0){
          h+='<div style="font-size:13px;font-weight:600;color:var(--sky-d);margin-bottom:5px;padding:3px 0">'+c.trim()+'</div>';
        } else {
          h+='<span class="chip">'+c.trim()+'</span>';
        }
      });
      h+='</div>';
      h+='<div class="scol"><div class="scol-lbl">Musiciens</div>';
      s.mu.split(",").forEach(function(c){h+='<span class="chip">'+c.trim()+'</span>';});
      h+='</div></div>';
      var rg=s.rg;
      if(!rg){
        var match=CAMP_LOUANGE.find(function(x){return x.d===s.d;});
        if(match)rg=match.rg;
      }
      if(rg){
        h+='<div class="regie-bar">';
        rg.split(",").forEach(function(r){
          var p=r.split(":");
          h+='<div><span style="color:var(--muted)">'+p[0].trim()+'</span> <b style="color:var(--text);margin-left:4px">'+(p[1]||"").trim()+'</b></div>';
        });
        h+='</div>';
      }
      var chants=s.chants||[];
      var hasChants=chants.some(function(c){return c&&c.trim();});
      h+='<div class="chants-block">';
      h+='<div class="chants-lbl">Chants</div>';
      if(hasChants){
        chants.forEach(function(c,i){
          if(c&&c.trim()){
            h+='<div class="chant-line" style="color:var(--text);font-weight:500">'+c+'</div>';
          } else {
            h+='<div class="chant-line">Chant '+(i+1)+'</div>';
          }
        });
      } else {
        [1,2,3,4].forEach(function(i){h+='<div class="chant-line">Chant '+i+'</div>';});
      }
      h+='</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  document.getElementById("camp-content").innerHTML=h;
}

var reunTri="Tout";

function renderReunions(){
  var opts=["Tout","T1","T2","T3","T4","Réunion","Entr.","Événement"];
  document.getElementById("tri-reun").innerHTML=opts.map(function(o){
    return '<button class="fb'+(o===reunTri?" on":"")+'" onclick="setReunTri(\''+o+'\')">'+o+'</button>';
  }).join("");
  var rows=REUNIONS.filter(function(r){
    if(reunTri==="Tout")return true;
    if(["T1","T2","T3","T4"].indexOf(reunTri)>=0)return tri(r.d)===reunTri;
    return r.tp===reunTri;
  });
  var grps={};var grpOrder=[];
  rows.forEach(function(r){
    var m=MOIS[+r.d.split("-")[1]-1];
    if(!grps[m]){grps[m]=[];grpOrder.push(m);}
    grps[m].push(r);
  });
  var h="";
  grpOrder.forEach(function(m){
    h+='<div class="mois-hd">'+m+'</div>';
    grps[m].forEach(function(r){h+=buildReunCard(r);});
  });
  document.getElementById("reun-content").innerHTML=h||'<div class="empty">Aucune entrée</div>';
}
function buildReunCard(r){
  var col=RCOL[r.tp]||{bg:"#f0ebe0",c:"#5a7a82",l:r.tp||""};
  var p=r.d.split("-");var dt=new Date(+p[0],+p[1]-1,+p[2]);
  var h='<div class="reun-card">';
  h+='<div class="rdb"><div class="rdb-day">'+dt.getDate()+'</div><div class="rdb-m">'+MOISC[dt.getMonth()]+'</div></div>';
  h+='<div class="rdb-body">';
  h+='<div class="rdb-type">'+(r.ti||"")+'</div>';
  h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">';
  h+='<span class="rbadge" style="background:'+col.bg+';color:'+col.c+'">'+col.l+'</span>';
  if(r.gr)h+='<span class="rbadge" style="background:var(--beige);color:var(--muted)">'+r.gr+'</span>';
  h+='</div>';
  if(r.h||r.li)h+='<div class="rdb-lieu">'+[r.h,r.li].filter(Boolean).join(" — ")+'</div>';
  if(r.pa)h+='<div style="font-size:10px;color:var(--muted);margin-top:2px">'+r.pa+'</div>';
  if(r.no)h+='<div style="font-size:10px;color:var(--sky-d);margin-top:2px;font-style:italic">'+r.no+'</div>';
  h+='</div></div>';
  return h;
}

function csvUrl(sh){return BASE_URL+encodeURIComponent(sh);}
function parseCSV(txt){
  var rows=[];
  txt.split("\n").forEach(function(line){
    if(!line.trim())return;
    var row=[];var cur="";var inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){row.push(cur.trim());cur="";}
      else cur+=c;
    }
    row.push(cur.trim());rows.push(row);
  });
  return rows;
}
function parseDate(s){
  if(!s)return null;
  s=s.replace(/"+/g,"").trim();
  var m=s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if(m)return m[1]+"-"+String(+m[2]+1).padStart(2,"0")+"-"+String(+m[3]).padStart(2,"0");
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
  var p=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(p)return p[3]+"-"+p[2].padStart(2,"0")+"-"+p[1].padStart(2,"0");
  var p2=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);if(p2)return "20"+p2[3]+"-"+p2[2].padStart(2,"0")+"-"+p2[1].padStart(2,"0");
  var p3=s.match(/^(\d{1,2})\/(\d{1,2})$/);if(p3)return "2026-"+p3[2].padStart(2,"0")+"-"+p3[1].padStart(2,"0");
  return null;
}
function fetchSheet(sh,cb){fetch(csvUrl(sh)).then(function(r){return r.text();}).then(function(t){cb(parseCSV(t));}).catch(function(){cb([]);});}
function loadCulte(cb){fetchSheet("Franco_Louange",function(rows){
  var d=[];rows.forEach(function(r){var dt=parseDate(r[0]);if(!dt)return;
  d.push([dt,r[1]||"",r[2]||"",r[3]||"",r[4]||"",r[5]||"",r[6]||"",r[7]||"",r[8]||"",r[9]||"",r[10]||""]);
  });cb(d);
});}
function loadDej(cb){fetchSheet("Franco_Table_PtD",function(rows){
  var d=[];
  rows.forEach(function(r){
    var dL=parseDate(r[1]);
    if(dL){var eq=[r[2],r[3],r[4],r[5]].filter(function(v){return v&&v!=="---"&&v!=="—"&&v.indexOf("Équipe")<0&&v.trim()!=="";  });if(eq.length>0)d.push([dL,eq.join(", ")]);}
    var dR=parseDate(r[7]);
    if(dR){var eq=[r[8],r[9],r[10],r[11]].filter(function(v){return v&&v!=="---"&&v!=="—"&&v.indexOf("Équipe")<0&&v.trim()!=="";  });if(eq.length>0)d.push([dR,eq.join(", ")]);}
  });
  var seen={};var dedup=[];
  d.forEach(function(x){if(!seen[x[0]]){seen[x[0]]=true;dedup.push(x);}});
  dedup.sort(function(a,b){return a[0]<b[0]?-1:1;});
  cb(dedup);
});}
function loadMulti(sheets,cols,cb){var all=[];var done=0;sheets.forEach(function(sh){fetchSheet(sh,function(rows){rows.forEach(function(r){var dt=parseDate(r[0]);if(!dt)return;var row=[dt];for(var i=1;i<=cols;i++)row.push(r[i]||"");all.push(row);});if(++done>=sheets.length){all.sort(function(a,b){return a[0]<b[0]?-1:1;});cb(all);}});});}
function loadFidMusic(cb){fetchSheet("Fidélité_Musicien",function(rows){var d=[];rows.forEach(function(r){var dt=parseDate(r[1]);if(!dt)return;d.push([dt,r[2]||"",r[3]||"",r[4]||"",r[5]||""]);  });cb(d);});}
function loadEDDSheet(cb){
  fetchSheet("EDD",function(rows){
    var periodeKeys=["P1_JanFev","P2_MarAvr","P3_MaiJun","P4_JulAou","P5_SepOct","P6_NovDec"];
    var res={};
    periodeKeys.forEach(function(k){res[k]={label:k,classes:{"中班":[],"大班":[],"高班":[]}};});
    var cls=null;
    rows.forEach(function(r){
      if(r[0]==="DATE")return;
      var dt=parseDate(r[0]);
      if(!dt)return;
      if(r[7]&&["中班","大班","高班"].indexOf(r[7].trim())>=0)cls=r[7].trim();
      if(!cls)return;
      var m=mois(dt);
      var pk=periodeKeys[m<=2?0:m<=4?1:m<=6?2:m<=8?3:m<=10?4:5];
      res[pk].classes[cls].push([dt,r[1]||"",r[2]||"",r[3]||"",r[4]||"",r[5]||""]);
    });
    cb(res);
  });
}
function loadReuSheet(cb){fetchSheet("Réunion",function(rows){var d=[];rows.forEach(function(r){var dt=parseDate(r[0]);if(!dt||!r[2])return;d.push({d:dt,h:r[1]||"",tp:r[2]||"",gr:r[3]||"",ti:r[6]||"",li:r[5]||"",pa:r[7]||"",no:r[8]||"",aff:r[9]||""});});d=d.filter(function(r){return r.aff.toLowerCase()==="v"||r.aff==="✓"||r.aff==="1";});cb(d);});}
function loadCampus(isEnt,cb){
  fetchSheet("Campus_Louange",function(rows){
    var seances=[];
    rows.forEach(function(r){
      if(!r[0]||!r[1])return;
      if(r[1]!=="Matin"&&r[1]!=="Soir")return;
      var parts=r[0].replace(/"+/g,"").split("/");
      var label=(parts[0]||"").replace(/^0/,"")+"/"+parts[1];
      var ch=[r[2],r[3],r[4]].filter(function(v){return v&&v.trim();});
      var mu=[r[5]?"Piano: "+r[5]:"",r[6]?"Guitare: "+r[6]:"",r[7]?"Batterie: "+r[7]:""].filter(Boolean);
      var rg=[r[8]?"Sono: "+r[8]:"",r[9]?"PPT: "+r[9]:""].filter(Boolean);
      var ent=r[14]||"";
      var chants=[r[10]||"",r[11]||"",r[12]||"",r[13]||""];
      seances.push({d:label+" "+r[1],ch:ch.join(", "),mu:mu.join(", "),rg:rg.join(", "),ent:ent,chants:chants});
    });
    seances.sort(function(a,b){return a.d<b.d?-1:1;});
    cb(seances);
  });
}
var N_DONE=0;

  loadEDDSheet(function(d){EDD_DATA=d;EDD_PERIODES=Object.keys(d);shDone();});

  loadCampus(false,function(d){CAMP_LOUANGE=d;});
  loadCampus(true,function(d){CAMP_ENT=d;});
}

}
